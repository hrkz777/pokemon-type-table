name: Build Static Index

on:
  push:
    paths:
      - "src/**"
      - ".github/workflows/build-static-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs output
        run: python src/build_index.py

      - name: Commit generated docs output
        run: |
          if git diff --quiet -- docs; then
            echo "docs output is up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: rebuild static docs"
          git push
